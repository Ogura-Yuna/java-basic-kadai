<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
		<title>演習課題：NumberList</title>
	</head>
	<body>
		<h1>3の倍数の数値リストを表示</h1>
		<ul>
		    <li th:each="number : ${#numbers.sequence(1,20)}" th:if="${number % 3 == 0}" th:text="${number}"></li>
		</ul>	
	</body>
</html>
